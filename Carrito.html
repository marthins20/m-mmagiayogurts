<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carrito de Compras</title>
  <link rel="stylesheet" href="css/estilocarrito.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <!-- Carrito flotante (aparece al agregar producto) -->
    <div id="carrito-flotante" class="carrito-flotante oculto fixed top-24 left-4 w-80 bg-white/95 backdrop-blur border border-gray-300 rounded-2xl p-4 shadow-xl z-50">
        <div class="barra-superior flex justify-between items-center cursor-move mb-2">
            <h3 class="font-semibold">Producto agregado</h3>
            <span class="cerrar-carrito text-2xl text-red-500 hover:text-red-700 cursor-pointer" onclick="cerrarCarrito()">↩️</span>
        </div>
        <p class="text-sm text-gray-600">El producto se ha añadido al carrito.</p>
        <button onclick="cerrarCarrito()" class="mt-3 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg w-full">Cerrar</button>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Título y contador -->
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-2">
                <i class="fas fa-shopping-cart text-indigo-600"></i> Carrito de Compras
            </h1>
            <div class="flex items-center gap-4">
                <span class="text-sm font-medium text-gray-600">Items:</span>
                <span id="contador-carrito" class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full text-sm font-medium">0</span>
            </div>
        </div>
        <!-- Contenedor de dos columnas -->
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Columna izquierda: productos -->
            <div class="lg:w-2/3">
                <div class="bg-white rounded-2xl shadow-md overflow-hidden">
                    <!-- Cabecera de columnas (visible en desktop) -->
                    <div class="hidden md:grid grid-cols-12 gap-4 bg-gray-100 px-6 py-3 text-sm font-medium text-gray-600 border-b">
                        <div class="col-span-6">Producto</div>
                        <div class="col-span-2 text-center">Cantidad</div>
                        <div class="col-span-2 text-center">Subtotal</div>
                        <div class="col-span-2 text-center">Acción</div>
                    </div>

                    <!-- Lista de productos dinámica -->
                    <div id="cart-items-container" class="divide-y divide-gray-200">
                        <!-- Se llenará con JavaScript -->
                    </div>

                    <!-- Botones de acción -->
                    <div class="p-6 flex flex-wrap gap-4 border-t border-gray-200">
                        <button onclick="vaciarCarrito()" class="flex items-center gap-2 px-6 py-2.5 bg-red-50 hover:bg-red-100 text-red-600 rounded-xl transition font-medium">
                            <i class="fas fa-trash-alt"></i> Vaciar carrito
                        </button>
                        <button onclick="volverAlInicio()" class="flex items-center gap-2 px-6 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl transition font-medium">
                            <i class="fas fa-arrow-left"></i> Volver a la tienda
                        </button>
                        <button onclick="cancelarCompra()" class="w-full mt-3 bg-gray-500 hover:bg-gray-600 text-white font-semibold py-3 px-4 rounded-xl transition flex items-center justify-center gap-2">
                             <i class="fas fa-times-circle"></i> Cancelar compra
                        </button>
                        
                    </div>
                </div>
            </div>

            <!-- Columna derecha: formulario y resumen -->
            <div class="lg:w-1/3">
                <div class="bg-white rounded-2xl shadow-md p-6 sticky top-24">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center gap-2">
                        <i class="fas fa-clipboard-list text-indigo-600"></i> Resumen del pedido
                    </h2>

                    <!-- Formulario de datos -->
                    <div class="space-y-4 mb-6">
                        <div>
                            <label for="nombre" class="block text-sm font-medium text-gray-600 mb-1">Nombre completo</label>
                            <input type="text" id="nombre" required class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition">
                        </div>
                        <div>
                            <label for="telefono" class="block text-sm font-medium text-gray-600 mb-1">Teléfono</label>
                            <input type="text" id="telefono" required class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition">
                        </div>
                        <div>
                            <label for="direccion" class="block text-sm font-medium text-gray-600 mb-1">Dirección</label>
                            <input type="text" id="direccion" required class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition">
                        </div>
                        <div>
                            <label for="ciudad" class="block text-sm font-medium text-gray-600 mb-1">Ciudad</label>
                            <input type="text" id="ciudad" required class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition">
                        </div>
                        <div>
                            <label for="pago" class="block text-sm font-medium text-gray-600 mb-1">Medio de pago</label>
                            <select id="pago" class="w-full px-4 py-2 border border-gray-300 rounded-xl bg-white focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition">
                                <option value="Efectivo">Efectivo</option>
                                <option value="Nequi">Nequi</option>
                                <option value="Daviplata">Daviplata</option>
                                <option value="Transferencia">Transferencia bancaria</option>
                            </select>
                        </div>
                        <div>
                            <label for="diaEntrega" class="block text-sm font-medium text-gray-600 mb-1">Día de entrega</label>
                            <select id="diaEntrega" class="w-full px-4 py-2 border border-gray-300 rounded-xl bg-white focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition">
                                <option value="Jueves">Jueves</option>
                                <option value="Sábado">Sábado</option>
                            </select>
                        </div>
                    </div>

                    <!-- Totales -->
                    <div class="border-t border-gray-200 pt-4 space-y-2">
                        <div class="flex justify-between text-gray-600">
                            <span>Subtotal</span>
                            <span id="subtotal">$0</span>
                        </div>
                        <div class="flex justify-between text-gray-600">
                            <span>Envío</span>
                            <span class="text-green-600">Gratis</span>
                        </div>
                        <div class="flex justify-between text-lg font-semibold text-gray-800 pt-2 border-t border-gray-200">
                            <span>Total</span>
                            <span id="total">$0</span>
                        </div>
                    </div>

                    <!-- Botón WhatsApp -->
                    <button onclick="enviarWhatsApp()" class="w-full mt-6 bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-xl transition flex items-center justify-center gap-2">
                        <i class="fab fa-whatsapp text-xl"></i> Enviar pedido por WhatsApp
                    </button>
                </div>
            </div>
        </div>
    </div>
    <!-- Primero tu script original -->
    <script src="Java Scrip/progrmacion carrito.js"></script>

</body>
</html>
